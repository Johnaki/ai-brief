	name: AI Brief
	on:
	  schedule:
	    - cron: '0 0,4,8,12 * * *'
	  workflow_dispatch:
	jobs:
	  run-brief:
	    runs-on: ubuntu-latest
	    steps:
	      - name: Checkout
	        uses: actions/checkout@v3
	      - name: Setup Python
	        uses: actions/setup-python@v4
	        with:
	          python-version: '3.10'
	      - name: Install dependencies
	        run: pip install requests
	      - name: Run Script
	        run: python brief.py
	        env:
	          SERVERCHAN_KEY: ${{ secrets.SERVERCHAN_KEY }}
