	name: AI Brief Cron Job
	on:
	  schedule:
	    # 注意：GitHub Actions使用UTC时间，北京时间需减8小时
	    # 北京时间 8点(UTC 0点), 12点(UTC 4点), 16点(UTC 8点), 20点(UTC 12点)
	    - cron: '0 0,4,8,12 * * *'
	  workflow_dispatch: # 支持手动点击测试运行
	jobs:
	  run-script:
	    runs-on: ubuntu-latest
	    steps:
	      - name: Checkout code
	        uses: actions/checkout@v3
	      - name: Set up Python
	        uses: actions/setup-python@v4
	        with:
	          python-version: '3.10'
	      - name: Install dependencies
	        run: |
	          python -m pip install --upgrade pip
	          pip install requests
	      - name: Run AI Brief Script
	        env:
	          SERVERCHAN_KEY: ${{ secrets.SERVERCHAN_KEY }}
	        run: python brief.py
